server:
  port: 8080

  # 全局错误（兜底，不给客户端暴露 stack trace）
  error:
    include-stacktrace: never
    include-message: never

# JWT 配置
jwt:
  secret: QmxvZ0h1YkAyMDI0U2VjcmV0S2V5Rm9ySldUVG9rZW5HZW5lcmF0aW9u
  expiration: 86400000       # Access Token: 24h
  refresh-expiration: 604800000  # Refresh Token: 7d

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/blog_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

    # HikariCP 连接池配置
    hikari:
      pool-name: BlogHikariPool
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 30000
      connection-test-query: SELECT 1

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  servlet:
    multipart:
      enabled: true
      max-file-size: 200MB
      max-request-size: 500MB

# 文件上传
upload:
  dir: ../uploads

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.blog.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

logging:
  level:
    com.blog: debug
    com.blog.mapper: trace
  config: classpath:logback-spring.xml

# SpringDoc OpenAPI（Swagger）
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui.html

---
spring:
  config:
    activate:
      on-profile: prod

springdoc:
  api-docs:
    enabled: false
