server:
  port: 8081

# 博客站点地址（用于 RSS/Sitemap 生成）
blog:
  base-url: ${BLOG_BASE_URL:http://localhost:8081}

spring:
  profiles:
    active: local
  # 全局错误（兜底，不给客户端暴露 stack trace）
  error:
    include-stacktrace: never
    include-message: never
  datasource:
    url: jdbc:mysql://localhost:3306/blog_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:Aa123456}
    database: 0
    timeout: 3000ms

    # HikariCP 连接池配置
    hikari:
      pool-name: BlogHikariPool
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 30000
      connection-test-query: SELECT 1

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  servlet:
    multipart:
      enabled: true
      max-file-size: 200MB
      max-request-size: 500MB

# JWT 配置
jwt:
  secret: ${JWT_SECRET:QmxvZ0h1YkAyMDI0U2VjcmV0S2V5Rm9ySldUVG9rZW5HZW5lcmF0aW9u}
  expiration: 86400000       # Access Token: 24h
  refresh-expiration: 604800000  # Refresh Token: 7d

# 文件上传
upload:
  dir: ./uploads

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.blog.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

logging:
  level:
    com.blog: debug
    com.blog.mapper: trace
  config: classpath:logback-spring.xml

# Knife4j API 文档
knife4j:
  enable: true
  setting:
    language: zh_cn

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# MiMo AI 配置
mimo:
  api-key: ${MIMO_API_KEY:}
  api-url: ${MIMO_API_URL:https://token-plan-cn.xiaomimimo.com/v1/chat/completions}
  default-model: mimo-v2.5-pro
  models:
    - id: mimo-v2.5-pro
      name: MiMo V2.5 Pro
      api-model: mimo-v2.5-pro
      description: 强大的通用模型，适合大多数任务
      max-tokens: 4096
      support-thinking: true
      support-image: false
      temperature: 0.7
      top-p: 0.95
    - id: mimo-v2.5-flash
      name: MiMo V2.5 Flash
      api-model: mimo-v2.5
      description: 快速响应，适合简单对话
      max-tokens: 2048
      support-thinking: false
      support-image: false
      temperature: 0.7
      top-p: 0.95
    - id: mimo-v2.5
      name: MiMo V2.5
      api-model: mimo-v2.5
      description: 支持图像理解，多模态能力
      max-tokens: 4096
      support-thinking: true
      support-image: true
      temperature: 0.7
      top-p: 0.95

# XXL-Job 配置
xxl:
  job:
    admin:
      addresses: ${XXL_JOB_ADMIN_ADDR:http://localhost:8082/xxl-job-admin}
    accessToken: ${XXL_JOB_TOKEN:bloghub-token}
    executor:
      appname: bloghub-executor
      port: ${XXL_JOB_PORT:9999}
      logpath: ./logs/xxl-job

---
spring:
  config:
    activate:
      on-profile: prod

springdoc:
  api-docs:
    enabled: false
