version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: bloghub-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: blog_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./blog-backend/sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./blog-backend/sql/xxl_job_init.sql:/docker-entrypoint-initdb.d/02-xxl-job.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bloghub-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: blog-backend/Dockerfile
    container_name: bloghub-backend
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/blog_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      JWT_SECRET: bloghub-docker-secret-key-change-in-production
      UPLOAD_DIR: /app/uploads
      REDIS_HOST: redis
      REDIS_PASSWORD: Aa123456
    volumes:
      - upload_data:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: nginx:alpine
    container_name: bloghub-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./blog-frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      backend:
        condition: service_healthy

  xxl-job-admin:
    image: xuxueli/xxl-job-admin:2.4.0
    container_name: bloghub-xxl-job-admin
    restart: unless-stopped
    ports:
      - "8082:8080"
    environment:
      PARAMS: --spring.datasource.url=jdbc:mysql://mysql:3306/xxl_job?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai --spring.datasource.username=root --spring.datasource.password=root
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/xxl-job-admin"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
  upload_data:
  redis_data:
